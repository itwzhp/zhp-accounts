identity:
  type: SystemAssigned
location: Poland Central
name: {{ACA_APP_NAME}}
properties:
  configuration:
    activeRevisionsMode: Single
    ingress:
      allowInsecure: false
      corsPolicy:
        allowedOrigins: [{{INGRESS_CORS_ALLOWED_ORIGINS}}]
        allowedMethods:
        - GET
        - POST
        - OPTIONS
        allowedHeaders:
        - Content-Type
        - Authorization
        - Authorize
        - X-InternalAuth
      external: true
      stickySessions:
        affinity: none
      targetPort: 3000
      traffic:
      - latestRevision: true
        weight: 100
      transport: Auto
    maxInactiveRevisions: 100
    registries:
    - identity: system-environment
      server: zhpaccounts-cybcbyf5abbfdpg9.azurecr.io
    secrets:
    - name: internal-auth-jwt-secret
      value: {{INTERNAL_AUTH_JWT_SECRET}}
    - name: audit-elastic-username
      value: {{AUDIT_ELASTIC_USERNAME}}
    - name: audit-elastic-password
      value: {{AUDIT_ELASTIC_PASSWORD}}
    - name: microsoft-provider-authentication-secret
  environmentId: /subscriptions/35e22786-93ea-47c8-902a-16e9d0f03e17/resourceGroups/zhp-accounts/providers/Microsoft.App/managedEnvironments/managedEnvironment-zhpaccounts-978a
  template:
    containers:
    - image: {{IMAGE_NAME}}
      name: backend
      env:
      - name: NODE_ENV
        value: "{{NODE_ENV}}"
      - name: ENABLE_CORS
        value: "false"
      - name: INTERNAL_AUTH_JWT_SECRET
        secretRef: internal-auth-jwt-secret
      - name: AUDIT_ELASTIC_ENDPOINT
        value: {{AUDIT_ELASTIC_ENDPOINT}}
      - name: AUDIT_ELASTIC_USERNAME
        secretRef: audit-elastic-username
      - name: AUDIT_ELASTIC_PASSWORD
        secretRef: audit-elastic-password
      - name: AUDIT_ELASTIC_REQUEST_TIMEOUT_MS
        value: "3000"
      probes:
      - failureThreshold: 2
        httpGet:
          path: /healthcheck/liveliness
          port: 3000
          scheme: HTTP
        periodSeconds: 10
        successThreshold: 1
        timeoutSeconds: 3
        type: Liveness
      - failureThreshold: 8
        httpGet:
          path: /healthcheck/readiness
          port: 3000
          scheme: HTTP
        periodSeconds: 13
        successThreshold: 1
        timeoutSeconds: 20
        type: Readiness
      - failureThreshold: 240
        httpGet:
          path: /healthcheck/liveliness
          port: 3000
          scheme: HTTP
        initialDelaySeconds: 1
        periodSeconds: 1
        successThreshold: 1
        timeoutSeconds: 2
        type: Startup
      resources:
        cpu: 0.25
        memory: 0.5Gi
    scale:
      maxReplicas: 3
      minReplicas: 0
      rules:
      - http:
          metadata:
            concurrentRequests: '30'
        name: http-scaler
  workloadProfileName: Consumption