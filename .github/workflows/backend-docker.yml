name: Backend - Build and Deploy (TEST -> PROD)

on:
  push:
    branches:
      - main
    paths:
      - "apps/zhp-accounts-backend/**"
      - "apps/zhp-accounts-types/**"
      - ".github/workflows/backend-*"
  pull_request:
    branches:
      - main
    paths:
      - "apps/zhp-accounts-backend/**"
      - "apps/zhp-accounts-types/**"
      - ".github/workflows/backend-*"
      
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    environment: test
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure
        if: github.event_name == 'push'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        if: github.event_name == 'push'
        run: |
          echo "${{ secrets.ZHP_AZURE_CONTAINER_REGISTRY_ADMIN_PASSWORD }}" | docker login -u "${{ secrets.ZHP_AZURE_CONTAINER_REGISTRY_ADMIN_USER }}" --password-stdin "${{ vars.ZHP_AZURE_CONTAINER_REGISTRY_URL }}"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.ZHP_AZURE_CONTAINER_REGISTRY_URL }}/zhp/accounts-backend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Run tests
        uses: docker/build-push-action@v6
        with:
          context: ./apps
          file: ./apps/zhp-accounts-backend/Dockerfile
          target: tester
          push: false
          cache-from: type=gha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./apps
          file: ./apps/zhp-accounts-backend/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy Container App TEST settings
        if: github.event_name == 'push'
        env:
          ACA_APP_NAME: ${{ vars.ACA_APP_NAME }}
          NODE_ENV: test
          INGRESS_CORS_ALLOWED_ORIGINS: '"https://zhp-accounts-frontend.zhp-gk.workers.dev", "http://localhost:5173"'
          INTERNAL_AUTH_JWT_SECRET: ${{ secrets.INTERNAL_AUTH_JWT_SECRET }}
          AUDIT_ELASTIC_USERNAME: ${{ vars.ELASTIC_USERNAME }}
          AUDIT_ELASTIC_PASSWORD: ${{ secrets.ELASTIC_PASSWORD }}
          AUDIT_ELASTIC_ENDPOINT: ${{ vars.ELASTIC_URL }}
          TIPI_API_CLIENT_ID: ${{ secrets.TIPI_API_CLIENT_ID }}
          TIPI_API_CLIENT_SECRET: ${{ secrets.TIPI_API_CLIENT_SECRET }}
          MAIL_ACS_ENDPOINT: ${{ vars.MAIL_ACS_ENDPOINT }}
          MAIL_FROM_ADDRESS: test@konto.zhp.pl
          ZHP_AZURE_CONTAINER_REGISTRY_URL: ${{ vars.ZHP_AZURE_CONTAINER_REGISTRY_URL }}
          TEMPLATE_PATH: apps/zhp-accounts-backend/container-app.yaml
          RENDERED_PATH: /tmp/container-app-test.yaml
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE="${ZHP_AZURE_CONTAINER_REGISTRY_URL}/zhp/accounts-backend:sha-${SHORT_SHA}"
          cp "${TEMPLATE_PATH}" "${RENDERED_PATH}"
          sed -i "s|{{ACA_APP_NAME}}|${ACA_APP_NAME}|g" "${RENDERED_PATH}"
          sed -i "s|{{NODE_ENV}}|${NODE_ENV}|g" "${RENDERED_PATH}"
          sed -i "s|{{INGRESS_CORS_ALLOWED_ORIGINS}}|${INGRESS_CORS_ALLOWED_ORIGINS}|g" "${RENDERED_PATH}"
          sed -i "s|{{IMAGE_NAME}}|${IMAGE}|g" "${RENDERED_PATH}"
          sed -i "s|{{INTERNAL_AUTH_JWT_SECRET}}|${INTERNAL_AUTH_JWT_SECRET}|g" "${RENDERED_PATH}"
          sed -i "s|{{AUDIT_ELASTIC_USERNAME}}|${AUDIT_ELASTIC_USERNAME}|g" "${RENDERED_PATH}"
          sed -i "s|{{AUDIT_ELASTIC_PASSWORD}}|${AUDIT_ELASTIC_PASSWORD}|g" "${RENDERED_PATH}"
          sed -i "s|{{AUDIT_ELASTIC_ENDPOINT}}|${AUDIT_ELASTIC_ENDPOINT}|g" "${RENDERED_PATH}"
          sed -i "s|{{TIPI_API_CLIENT_ID}}|${TIPI_API_CLIENT_ID}|g" "${RENDERED_PATH}"
          sed -i "s|{{TIPI_API_CLIENT_SECRET}}|${TIPI_API_CLIENT_SECRET}|g" "${RENDERED_PATH}"
          sed -i "s|{{ZHP_AZURE_CONTAINER_REGISTRY_URL}}|${ZHP_AZURE_CONTAINER_REGISTRY_URL}|g" "${RENDERED_PATH}"
          sed -i "s|{{MAIL_ACS_ENDPOINT}}|${MAIL_ACS_ENDPOINT}|g" "${RENDERED_PATH}"
          sed -i "s|{{MAIL_FROM_ADDRESS}}|${MAIL_FROM_ADDRESS}|g" "${RENDERED_PATH}"
          az containerapp update \
            --name "${ACA_APP_NAME}" \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --subscription ${{ vars.AZURE_SUBSCRIPTION_ID }} \
            --yaml "${RENDERED_PATH}"

  deploy-prod:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-and-test
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Container App PROD settings
        env:
          ACA_APP_NAME: ${{ vars.ACA_APP_NAME }}
          NODE_ENV: production
          INGRESS_CORS_ALLOWED_ORIGINS: '"https://konto.zhp.pl"'
          INTERNAL_AUTH_JWT_SECRET: ${{ secrets.INTERNAL_AUTH_JWT_SECRET }}
          AUDIT_ELASTIC_USERNAME: ${{ vars.ELASTIC_USERNAME }}
          AUDIT_ELASTIC_PASSWORD: ${{ secrets.ELASTIC_PASSWORD }}
          AUDIT_ELASTIC_ENDPOINT: ${{ vars.ELASTIC_URL }}
          TIPI_API_CLIENT_ID: ${{ secrets.TIPI_API_CLIENT_ID }}
          TIPI_API_CLIENT_SECRET: ${{ secrets.TIPI_API_CLIENT_SECRET }}
          MAIL_ACS_ENDPOINT: ${{ vars.MAIL_ACS_ENDPOINT }}
          MAIL_FROM_ADDRESS: automat@konto.zhp.pl
          ZHP_AZURE_CONTAINER_REGISTRY_URL: ${{ vars.ZHP_AZURE_CONTAINER_REGISTRY_URL }}
          TEMPLATE_PATH: apps/zhp-accounts-backend/container-app.yaml
          RENDERED_PATH: /tmp/container-app-prod.yaml
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE="${ZHP_AZURE_CONTAINER_REGISTRY_URL}/zhp/accounts-backend:sha-${SHORT_SHA}"
          cp "${TEMPLATE_PATH}" "${RENDERED_PATH}"
          sed -i "s|{{ACA_APP_NAME}}|${ACA_APP_NAME}|g" "${RENDERED_PATH}"
          sed -i "s|{{NODE_ENV}}|${NODE_ENV}|g" "${RENDERED_PATH}"
          sed -i "s|{{INGRESS_CORS_ALLOWED_ORIGINS}}|${INGRESS_CORS_ALLOWED_ORIGINS}|g" "${RENDERED_PATH}"
          sed -i "s|{{IMAGE_NAME}}|${IMAGE}|g" "${RENDERED_PATH}"
          sed -i "s|{{INTERNAL_AUTH_JWT_SECRET}}|${INTERNAL_AUTH_JWT_SECRET}|g" "${RENDERED_PATH}"
          sed -i "s|{{AUDIT_ELASTIC_USERNAME}}|${AUDIT_ELASTIC_USERNAME}|g" "${RENDERED_PATH}"
          sed -i "s|{{AUDIT_ELASTIC_PASSWORD}}|${AUDIT_ELASTIC_PASSWORD}|g" "${RENDERED_PATH}"
          sed -i "s|{{AUDIT_ELASTIC_ENDPOINT}}|${AUDIT_ELASTIC_ENDPOINT}|g" "${RENDERED_PATH}"
          sed -i "s|{{TIPI_API_CLIENT_ID}}|${TIPI_API_CLIENT_ID}|g" "${RENDERED_PATH}"
          sed -i "s|{{TIPI_API_CLIENT_SECRET}}|${TIPI_API_CLIENT_SECRET}|g" "${RENDERED_PATH}"
          sed -i "s|{{ZHP_AZURE_CONTAINER_REGISTRY_URL}}|${ZHP_AZURE_CONTAINER_REGISTRY_URL}|g" "${RENDERED_PATH}"
          sed -i "s|{{MAIL_ACS_ENDPOINT}}|${MAIL_ACS_ENDPOINT}|g" "${RENDERED_PATH}"
          sed -i "s|{{MAIL_FROM_ADDRESS}}|${MAIL_FROM_ADDRESS}|g" "${RENDERED_PATH}"
          az containerapp update \
            --name "${ACA_APP_NAME}" \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --subscription ${{ vars.AZURE_SUBSCRIPTION_ID }} \
            --yaml "${RENDERED_PATH}"


