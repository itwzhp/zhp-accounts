name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    paths:
      - "apps/zhp-accounts-backend/**"
      - "apps/zhp-accounts-types/**"
      - ".github/workflows/backend-docker.yml"
  pull_request:
    branches:
      - main
    paths:
      - "apps/zhp-accounts-backend/**"
      - "apps/zhp-accounts-types/**"
      - ".github/workflows/backend-docker.yml"
      
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure
        if: github.event_name == 'push'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        if: github.event_name == 'push'
        run: az acr login --name ${{ vars.ACR_ENDPOINT }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.ACR_ENDPOINT }}/zhp/accounts-backend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Run tests
        uses: docker/build-push-action@v6
        with:
          context: ./apps
          file: ./apps/zhp-accounts-backend/Dockerfile
          target: tester
          push: false
          cache-from: type=gha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./apps
          file: ./apps/zhp-accounts-backend/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy Container App settings
        if: github.event_name == 'push'
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE="${{ vars.ACR_ENDPOINT }}/zhp/accounts-backend:sha-${SHORT_SHA}"
          sed -i "s|image: .*|image: ${IMAGE}|" apps/zhp-accounts-backend/container-app.yaml
          az containerapp update \
            --name ${{ vars.ACA_APP_NAME }} \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --subscription ${{ vars.AZURE_SUBSCRIPTION_ID }} \
            --yaml apps/zhp-accounts-backend/container-app.yaml


