name: Frontend - Build and Deploy PROD

on:
  workflow_run:
    workflows: ["Frontend - Build and Deploy TEST"]
    types: [completed]

jobs:
  deploy-prod:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          lfs: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: apps/zhp-accounts-frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ./apps/zhp-accounts-frontend

      - name: Type check
        run: pnpm run check
        working-directory: ./apps/zhp-accounts-frontend

      - name: Test
        run: pnpm test
        working-directory: ./apps/zhp-accounts-frontend

      - name: Build
        run: pnpm build -- --mode production
        working-directory: ./apps/zhp-accounts-frontend

      - name: Deploy PROD to Cloudflare
        run: pnpm exec wrangler deploy --env prod
        working-directory: ./apps/zhp-accounts-frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
