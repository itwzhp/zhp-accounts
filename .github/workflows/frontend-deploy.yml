name: Frontend - Build and deploy PROD

on:
  push:
    branches:
      - main
    paths:
      - 'apps/zhp-accounts-frontend/**'
      - 'apps/zhp-accounts-types/**'
      - '.github/workflows/frontend-deploy.yml'

jobs:
  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
            lfs: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: apps/zhp-accounts-frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ./apps/zhp-accounts-frontend

      - name: Type check
        run: pnpm run check
        working-directory: ./apps/zhp-accounts-frontend

      - name: Test
        run: pnpm test
        working-directory: ./apps/zhp-accounts-frontend

      - name: Build
        run: pnpm build
        working-directory: ./apps/zhp-accounts-frontend

      - name: Deploy to Cloudflare
        run: pnpm exec wrangler deploy
        working-directory: ./apps/zhp-accounts-frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
